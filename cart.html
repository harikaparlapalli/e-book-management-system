<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cart</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Top Header -->
    <header class="top-header">
        <div class="left">BVRITH E-BOOK SYSTEM</div>
        <div class="right">Welcome, Harika P | Roll No.: 24WH1A05C8</div>
    </header>

    <div class="container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="catalog.html">Catalog</a>
            <a href="cart.html" class="active">Cart</a>
            <a href="logout.html">Logout</a>
        </aside>

        <!-- Main Content -->
        <main class="content">

            <div class="card">
                <h2 style="text-align:center;">Shopping Cart</h2>
                <br>

                <table>
                    <tr>
                        <th>Product</th>
                        <th>Qty</th>
                        <th>Price</th>
                        <th>Total</th>
                        <th>Remove</th>
                    </tr>
                    <tr>
                        <td>Product 1</td>
                        <td>2</td>
                        <td>Rs.150</td>
                        <td>Rs.300</td>
                        <td>
                            <button class="danger-btn">Remove</button>
                        </td>
                    </tr>
                </table>

                <br>

                <h3 style="text-align:right;">Total: Rs. 300</h3>

                <div style="text-align:right;">
                    <a href="#bill" class="primary-btn">
                        Proceed to Checkout
                    </a>
                </div>

            </div>

        </main>

    </div>

    <!-- Floating Bill Popup -->
    <div id="bill" class="bill-overlay">
        <div class="bill-popup">
            <h2 style="text-align:center;">Purchase Bill</h2>

            <table>
                <tr>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Total</th>
                </tr>
                <tr>
                    <td>Product 1</td>
                    <td>2</td>
                    <td>Rs.300</td>
                </tr>
            </table>

            <h3 style="text-align:right; margin-top:20px;">
                Grand Total: Rs.300
            </h3>

            <div style="text-align:right; margin-top:20px;">
                <a href="#" class="primary-btn">Close</a>
            </div>
        </div>
    </div>

    <footer>2026 BVRITH</footer>

</body>
</html>
